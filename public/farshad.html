<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWN CREATE WEB SITE</title>
    <style>
        /* Ividuthaanu page-inu color-um design-um nalkunnath (CSS) */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #24bb0c77;
        }
        header {
            background-color: red;
            color: blue;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #444;
            text-align: center;
            padding: 10px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover {
            color: #ff9900;
        }
        .container {
            padding: 20px;
            text-align: center;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Header Section (Website Name) -->
    <header>
        <h1>INTERNSHIP</h1>
    </header>

    <!-- Navigation Bar (Links) -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Main Content Section -->
    <div class="container">
        <h2>Welcome to My Website!</h2>
        <p>THIS IS A SIMPLE FRONT PAGE DESINGED WITH HTML AND CSS.</p>
        <button style="padding: 10px 20px; font-size: 16px; cursor: pointer;">More Details</button>
    </div>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 THIS IS MY WEBSITE. All Rights Reserved.</p>
    </footer>

</body>
</html>
