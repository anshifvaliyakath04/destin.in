<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Destin.in</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--light-green) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--bg-white);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .login-card img {
            height: 50px;
            margin-bottom: 2rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .error-msg {
            color: red;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
        .success-msg {
            color: green;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="index.html" style="text-decoration: none;">
            <h1 style="color: var(--primary-color); font-family: var(--font-heading); margin-bottom: 1rem; font-size: 2.5rem;">Destin.in</h1>
        </a>
        <h2 style="margin-bottom: 0.5rem; color: var(--primary-color);">Create an Account</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Sign up to save your trip plans.</p>
        
        <div id="error-message" class="error-msg"></div>
        <div id="success-message" class="success-msg"></div>

        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="signupBtn">Sign Up</button>
        </form>
        
        <div style="margin-top: 2rem; font-size: 0.9rem;">
            <span style="color: var(--text-muted);">Already have an account?</span> 
            <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Log In</a>
        </div>
        <div style="margin-top: 1rem;">
            <a href="index.html" style="color: var(--text-muted); font-size: 0.9rem;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
